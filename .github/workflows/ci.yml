name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  THREADS_WORKER_INIT_TIMEOUT: 15000

jobs:
  # Fast feedback: build + lint once before the heavier matrices run.
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run build
      - run: npm run lint

  # Library + tooling tests across supported Node versions on Linux.
  test:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node_version: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - name: Setup node ${{ matrix.node_version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node_version }}
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run build
      - run: npm run test:library
      - run: npm run test:tooling

  # Coverage gate + reporting (single canonical run).
  coverage:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run build
      - name: Library tests with coverage
        run: npm run test:coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: warn
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
        # No token needed for tokenless uploads on public repos; add
        # CODECOV_TOKEN as a repo secret for private repos / reliable uploads.

  # Real browser run (Playwright + Chromium).
  browser:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run build
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - run: npm run test:browser

  # Worker path handling is platform-specific, so smoke-test Windows + macOS.
  cross-platform:
    needs: lint
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: ['windows-latest', 'macos-latest']
    steps:
      - uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run build
      - run: npm run test:library
      - run: npm run test:tooling
