name: publish

# Publishes the package to npm when a GitHub Release is published, or manually
# via the Actions tab. Requires:
#   - an NPM_TOKEN repository secret (npm automation token with publish rights)
#   - the version in package.json to match the release tag
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run build
      # Sanity gate before publishing (the full browser suite runs in ci.yml).
      - run: npm run lint
      - run: npm run test:library
      - run: npm run test:tooling
      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
