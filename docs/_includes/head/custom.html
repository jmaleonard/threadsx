<link rel="stylesheet" href="{{ site.baseurl }}/assets/main.css">

{%- assign og_title = page.title | default: site.title -%}
{%- assign og_desc = page.excerpt | default: site.description | strip_html | strip_newlines | truncate: 200 -%}
{%- assign og_url = page.url | absolute_url -%}
{%- assign og_image = "/assets/og-image.png" | absolute_url -%}

<meta name="description" content="{{ og_desc }}">
<link rel="canonical" href="{{ og_url }}">

<!-- Open Graph -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="threadsx">
<meta property="og:title" content="{{ og_title }} · threadsx">
<meta property="og:description" content="{{ og_desc }}">
<meta property="og:url" content="{{ og_url }}">
<meta property="og:image" content="{{ og_image }}">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

<!-- Twitter -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ og_title }} · threadsx">
<meta name="twitter:description" content="{{ og_desc }}">
<meta name="twitter:image" content="{{ og_image }}">
